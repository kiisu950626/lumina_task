name: Security Checks

on:
  push:
    branches: ["**"]   # Run on all branches
  pull_request:
    branches: ["**"]   # Run on all PRs
  workflow_dispatch:    # Allow manual runs

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install gitleaks by compiling through the Go module proxy
      # (proxy.golang.org) instead of pulling a prebuilt tarball from
      # the GitHub Releases CDN. Reasons:
      #   - The Releases CDN has been intermittently 504ing on the
      #     v8.28.0 linux_x64 asset for longer than a sane retry window.
      #   - The official gitleaks-action requires a paid license for
      #     organization repos, even public ones.
      #   - proxy.golang.org is independent infrastructure (Google) and
      #     is markedly more reliable for CI installs.
      # Note: the Go module path is the legacy github.com/zricethezav/...
      # path; the repo moved to gitleaks/gitleaks but go.mod keeps the
      # original import for backwards compatibility.
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install Gitleaks CLI (via Go module proxy)
        run: |
          GITLEAKS_VERSION=8.28.0
          go install "github.com/zricethezav/gitleaks/v8@v${GITLEAKS_VERSION}"
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run Gitleaks (full scan)
        run: |
          gitleaks detect --source . --redact --exit-code=2 --report-format=sarif --report-path=results.sarif

      - name: Ensure SARIF exists
        if: always()
        run: |
          if [ ! -f results.sarif ]; then
            echo "{}" > results.sarif
          fi

      - name: Upload Gitleaks Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-results.sarif
          path: results.sarif

  dependency-review:
    name: Dependency Review (Vulnerability Scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependency Review(PR)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high   # fail build if high severity vuln detected
          comment-summary-in-pr: true

      - name: Dependency Review(Push)
        if: github.event_name == 'push'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high   # fail build if high severity vuln detected
          comment-summary-in-pr: true
          base-ref: ${{ github.event.before }}
          head-ref: ${{ github.sha }}